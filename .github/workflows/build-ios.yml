name: Build iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate iOS project and get deps
        working-directory: mobile
        run: |
          flutter create --platforms ios .
          flutter pub get

      - name: Patch iOS project for unsigned build
        working-directory: mobile/ios
        run: |
          # Set minimum deployment target to 14.0
          sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" Podfile

          # Add post_install hook to disable signing and fix deployment target in ALL pods
          cat >> Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF

          # Fix Runner project deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' Runner.xcodeproj/project.pbxproj

          # Disable signing in Runner project
          sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/d' Runner.xcodeproj/project.pbxproj

          # Reinstall pods
          pod install --repo-update

      - name: Build iOS
        working-directory: mobile
        run: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r mobile/build/ios/iphoneos/Runner.app Payload/
          zip -r RAHEL.ipa Payload/

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAHEL-iOS
          path: RAHEL.ipa
          retention-days: 30
