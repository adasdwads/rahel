name: Build iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate iOS project
        working-directory: mobile
        run: |
          flutter create --platforms ios .
          flutter pub get

      - name: Set minimum iOS deployment target
        working-directory: mobile/ios
        run: |
          # Update Podfile minimum target
          sed -i '' "s/platform :ios, '.*'/platform :ios, '14.0'/" Podfile
          # Update project.pbxproj deployment targets
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' Runner.xcodeproj/project.pbxproj
          # Reinstall pods with updated target
          pod install --repo-update

      - name: Disable code signing in Xcode
        working-directory: mobile/ios
        run: |
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/d' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS release
        working-directory: mobile
        run: |
          flutter build ios --release --no-codesign --config-only
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            -derivedDataPath ../build/ios/derived \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r mobile/build/ios/derived/Build/Products/Release-iphoneos/Runner.app Payload/
          zip -r RAHEL.ipa Payload/

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAHEL-iOS
          path: RAHEL.ipa
          retention-days: 30
