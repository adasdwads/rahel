name: Build iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate iOS project
        working-directory: mobile
        run: |
          flutter create --platforms ios .
          flutter pub get

      - name: Build iOS release
        working-directory: mobile
        run: |
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r mobile/build/ios/iphoneos/Runner.app Payload/
          zip -r RAHEL.ipa Payload/

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: RAHEL-iOS
          path: RAHEL.ipa
          retention-days: 30
