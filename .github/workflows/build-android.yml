name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      FLUTTER_VERSION: 3.24.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          java -version

      - name: Generate Android host project
        working-directory: mobile
        run: |
          flutter pub get
          flutter create --platforms android --org com.rahel.app .

      - name: Configure Android app labels
        working-directory: mobile
        run: |
          mkdir -p android/app/src/main/res/values android/app/src/main/res/values-ar
          cat <<'EOF' > android/app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Rahel</string>
          </resources>
          EOF
          cat <<'EOF' > android/app/src/main/res/values-ar/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">راحل</string>
          </resources>
          EOF
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          text = text.replace('android:label="rahel"', 'android:label="@string/app_name"')
          text = text.replace('android:label="Rahel"', 'android:label="@string/app_name"')
          text = text.replace('android:label="Runner"', 'android:label="@string/app_name"')
          manifest.write_text(text)
          PY

      - name: Build release APK
        working-directory: mobile
        run: |
          flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: RAHEL-Android-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
